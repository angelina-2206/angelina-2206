<svg width="800" height="120" viewBox="0 0 800 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0d0d12"/>
      <stop offset="50%"  stop-color="#13101a"/>
      <stop offset="100%" stop-color="#0d0d12"/>
    </linearGradient>
    <linearGradient id="pink-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#F75C7E" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#F75C7E" stop-opacity="0.18"/>
      <stop offset="50%"  stop-color="#F75C7E" stop-opacity="0.32"/>
      <stop offset="60%"  stop-color="#F75C7E" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#F75C7E" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F75C7E" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow-pink">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="120" fill="url(#bg-grad)" rx="12"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="40"  x2="800" y2="40"  stroke="#F75C7E" stroke-width="0.2" stroke-opacity="0.15"/>
  <line x1="0" y1="80"  x2="800" y2="80"  stroke="#F75C7E" stroke-width="0.2" stroke-opacity="0.15"/>
  <line x1="200" y1="0" x2="200" y2="120" stroke="#F75C7E" stroke-width="0.2" stroke-opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="120" stroke="#F75C7E" stroke-width="0.2" stroke-opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="120" stroke="#F75C7E" stroke-width="0.2" stroke-opacity="0.1"/>

  <!-- Glow orb pulse -->
  <ellipse cx="400" cy="60" rx="260" ry="50" fill="url(#pink-grad)">
    <animate attributeName="rx" values="240;280;240" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Border glow -->
  <rect width="800" height="120" fill="none" stroke="#F75C7E" stroke-width="1" stroke-opacity="0.25" rx="12">
    <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Scan line sweeping down -->
  <rect x="0" y="0" width="800" height="2" fill="#F75C7E" fill-opacity="0.35" rx="1">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,118;0,0" dur="5s" repeatCount="indefinite" calcMode="ease-in-out"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner accents -->
  <path d="M12 30 L12 12 L30 12" fill="none" stroke="#F75C7E" stroke-width="1.5" stroke-opacity="0.7"/>
  <path d="M770 12 L788 12 L788 30" fill="none" stroke="#F75C7E" stroke-width="1.5" stroke-opacity="0.7"/>
  <path d="M12 90 L12 108 L30 108" fill="none" stroke="#F75C7E" stroke-width="1.5" stroke-opacity="0.7"/>
  <path d="M770 108 L788 108 L788 90" fill="none" stroke="#F75C7E" stroke-width="1.5" stroke-opacity="0.7"/>

  <!-- Monospace label -->
  <text x="28" y="42" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#F75C7E" fill-opacity="0.6" letter-spacing="2">// angelina-2206</text>

  <!-- Main name -->
  <text x="400" y="72" text-anchor="middle" font-family="'Syne', 'Arial Black', sans-serif" font-size="44" font-weight="800" fill="url(#text-grad)" letter-spacing="-1" filter="url(#glow-soft)">
    Angelina.
    <animate attributeName="opacity" values="0.9;1;0.9" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Tagline -->
  <text x="400" y="98" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#F75C7E" fill-opacity="0.55" letter-spacing="3">NOT ORDINARY · ON PURPOSE</text>

  <!-- Tiny pulse dots on border -->
  <circle cx="400" cy="1" r="2" fill="#F75C7E">
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="119" r="2" fill="#F75C7E">
    <animate attributeName="opacity" values="0;1;0" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>
</svg>
